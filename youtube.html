<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    #player {
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000;
    }

    #error {
        display: none;
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: Arial, sans-serif;
        font-size: 22px;
        text-align: center;
        background: #000;
    }

    #player iframe {
        position: absolute;
        left: -4%;
        top: -4%;
        width: 108% !important;
        height: 108% !important;
        pointer-events: none;
    }
</style>
</head>
<body>
    <div id="player"></div>
    <div id="error">YouTube video failed to load</div>

<script>
(function() {
    function hashParam(name) {
        var hash = String(window.location.hash || "").replace(/^#/, "");
        var parts = hash.split("&");

        for (var i = 0; i < parts.length; i++) {
            var pair = parts[i].split("=");
            if (decodeURIComponent(pair[0] || "") === name) {
                return decodeURIComponent(pair.slice(1).join("=") || "");
            }
        }

        return "";
    }

    function pageOrigin() {
        return window.location.protocol + "//" + window.location.host;
    }

    var videoID = hashParam("v");
    var offset = Math.max(0, parseFloat(hashParam("t")) || 0);
    var preloadMode = hashParam("preload") === "1";
    var player = null;
    var ready = false;
    var durationReported = false;
    var error = document.getElementById("error");
    var stateNames = {};
    var terminalError = false;
    var youtubeHost = "https://www.youtube-nocookie.com";

    function log(msg) {
        console.log("[YOKAI VIDEO YOUTUBE] " + msg);
    }

    function describeState(state) {
        if (typeof YT !== "undefined" && YT.PlayerState && !stateNames.READY) {
            stateNames[YT.PlayerState.UNSTARTED] = "UNSTARTED";
            stateNames[YT.PlayerState.ENDED] = "ENDED";
            stateNames[YT.PlayerState.PLAYING] = "PLAYING";
            stateNames[YT.PlayerState.PAUSED] = "PAUSED";
            stateNames[YT.PlayerState.BUFFERING] = "BUFFERING";
            stateNames[YT.PlayerState.CUED] = "CUED";
            stateNames.READY = true;
        }

        return (stateNames[state] || "UNKNOWN") + " (" + state + ")";
    }

    function errorHint(code) {
        if (code === 2) return "invalid video id or request parameter";
        if (code === 5) return "HTML5 player error";
        if (code === 100) return "video not found or private";
        if (code === 101 || code === 150) return "embedding disabled or blocked by YouTube for this environment";
        if (code === 153) return "missing or rejected Referer/origin context";

        return "unknown YouTube iframe error";
    }

    function logSnapshot(label) {
        var state = "no-player";
        var duration = 0;
        var currentTime = 0;
        var iframeCount = document.querySelectorAll("#player iframe").length;

        try {
            if (player && player.getPlayerState) state = describeState(player.getPlayerState());
            if (player && player.getDuration) duration = player.getDuration() || 0;
            if (player && player.getCurrentTime) currentTime = player.getCurrentTime() || 0;
        } catch (e) {
            log(label + " snapshot error: " + e);
            return;
        }

        log(label + " snapshot: ready=" + ready
            + " state=" + state
            + " time=" + Number(currentTime || 0).toFixed(3)
            + " duration=" + Number(duration || 0).toFixed(3)
            + " iframes=" + iframeCount
            + " origin=" + pageOrigin());
    }

    log("wrapper boot: videoID=" + videoID + " offset=" + offset.toFixed(3) + " preload=" + preloadMode + " origin=" + pageOrigin());

    // Yokai Lua sync treats this as a video-like object.
    var wrapper = {
        readyState: 0,
        get paused() {
            if (terminalError) return true;
            if (!ready || !player || !player.getPlayerState) return true;
            return player.getPlayerState() !== YT.PlayerState.PLAYING;
        },
        get duration() {
            if (terminalError) return 0;
            if (!ready || !player || !player.getDuration) return 0;
            return player.getDuration() || 0;
        },
        get currentTime() {
            if (terminalError) return 0;
            if (!ready || !player || !player.getCurrentTime) return 0;
            return player.getCurrentTime() || 0;
        },
        set currentTime(time) {
            if (terminalError) return;
            if (!ready || !player || !player.seekTo) return;
            player.seekTo(Math.max(0, time || 0), true);
        },
        play: function() {
            if (terminalError) return;
            if (ready && player && player.playVideo) {
                player.playVideo();
            }
        },
        pause: function() {
            if (ready && player && player.pauseVideo) {
                player.pauseVideo();
            }
        }
    };

    window.YokaiVideo = wrapper;
    window.MediaPlayer = wrapper;

    function showError(msg) {
        log(msg);
        error.style.display = "flex";
    }

    function hideError() {
        error.style.display = "none";
    }

    function reportDuration() {
        if (durationReported || !ready) return;

        var duration = wrapper.duration;
        if (isFinite(duration) && duration > 0) {
            durationReported = true;
            log("duration: " + duration);
            if (typeof Yokai !== "undefined" && Yokai.Duration) {
                Yokai.Duration(duration);
            }
        }
    }

    function resetPlayerContainer() {
        try {
            if (player && player.destroy) {
                player.destroy();
            }
        } catch (e) {
            log("player destroy error: " + e);
        }

        player = null;
        ready = false;
        wrapper.readyState = 0;
        document.getElementById("player").innerHTML = "";
    }

    function isGraceError(code) {
        return code === 101 || code === 150 || code === 153;
    }

    function isPlayerPlaying() {
        try {
            return ready && player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING;
        } catch (e) {
            return false;
        }
    }

    function finalizePlayerError(code, host) {
        if (isPlayerPlaying()) {
            log("ignored delayed YouTube player error: " + code + " because playback started");
            hideError();
            reportDuration();
            return;
        }

        showError("YouTube player error: " + code + " (" + errorHint(code) + ")");
        logSnapshot("error " + code);

        log("final YouTube player error: " + code + " on host=" + host);
        terminalError = true;
        ready = false;
        wrapper.readyState = 0;
    }

    function createPlayer() {
        terminalError = false;
        hideError();
        resetPlayerContainer();

        var host = youtubeHost;
        log("creating player: host=" + host + " start=" + Math.floor(offset));

        player = new YT.Player("player", {
            width: "100%",
            height: "100%",
            videoId: videoID,
            host: host,
            playerVars: {
                autoplay: preloadMode ? 0 : 1,
                cc_load_policy: 0,
                controls: 0,
                disablekb: 1,
                enablejsapi: 1,
                fs: 0,
                iv_load_policy: 3,
                playsinline: 1,
                rel: 0,
                modestbranding: 1,
                origin: pageOrigin(),
                widget_referrer: pageOrigin(),
                start: Math.floor(offset)
            },
            events: {
                onReady: function() {
                    ready = true;
                    wrapper.readyState = 4;
                    log("player ready");

                    if (preloadMode) {
                        try {
                            player.mute();
                            player.setVolume(0);
                            player.cueVideoById({
                                videoId: videoID,
                                startSeconds: offset
                            });
                        } catch (e) {
                            log("preload cue error: " + e);
                        }

                        reportDuration();
                        setTimeout(function() { logSnapshot("preload-ready"); }, 1000);
                        return;
                    }

                    if (offset > 0) {
                        log("initial seek: " + offset.toFixed(3));
                        player.seekTo(offset, true);
                    }

                    player.playVideo();
                    reportDuration();
                    setTimeout(function() { logSnapshot("post-ready"); }, 1000);
                },
                onStateChange: function(event) {
                    log("state change: " + describeState(event.data));

                    if (event.data === YT.PlayerState.PLAYING) {
                        reportDuration();
                    }

                    if (event.data === YT.PlayerState.ENDED) {
                        log("video ended");
                        if (typeof Yokai !== "undefined" && Yokai.Close) {
                            Yokai.Close();
                        }
                    }
                },
                onError: function(event) {
                    var code = Number(event.data || 0);
                    log("YouTube player error: " + code + " (" + errorHint(code) + ") on host=" + host);

                    if (isGraceError(code)) {
                        log("waiting before finalizing YouTube player error: " + code);
                        setTimeout(function() {
                            finalizePlayerError(code, host);
                        }, 3500);
                        return;
                    }

                    finalizePlayerError(code, host);
                }
            }
        });
    }

    window.onYouTubeIframeAPIReady = function() {
        log("iframe api ready");

        if (!videoID) {
            terminalError = true;
            showError("Missing YouTube video id");
            return;
        }

        createPlayer();
    };

    var script = document.createElement("script");
    script.src = "https://www.youtube.com/iframe_api";
    log("loading iframe api: " + script.src);
    script.onload = function() {
        log("iframe api script loaded");
    };
    script.onerror = function() {
        showError("Failed to load YouTube IFrame API");
    };
    document.head.appendChild(script);
})();
</script>
</body>
</html>
